name: Daily Loto Data Auto Updater

on:
  schedule:
    # 毎日 20:30 (JST) / 11:30 (UTC) に実行
    - cron: '30 11 * * *'
  workflow_dispatch: # 手動実行トリガー

permissions:
  contents: write # 変更をリポジトリにプッシュするために必要

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: Run update script
      run: |
        python update_data.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 変更があるか確認してコミット・プッシュ
        git add loto_data.js
        if git diff --staged --quiet; then
          echo "No updates found. Skipping commit."
        else
          git commit -m "Auto-update winning lottery data [skip ci]"
          git push origin main
        fi
